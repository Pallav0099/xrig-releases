name: Build and publish XRIG app release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag for this immutable release set (for example v1.0.0)
        required: true
        type: string
      platform_tag:
        description: Exact annotated/lightweight tag in Pallav0099/xrig-platform
        required: true
        type: string
      vertex_tag:
        description: Exact annotated/lightweight tag in Pallav0099/xrig-llama-backend
        required: true
        type: string
      kai_tag:
        description: Exact annotated/lightweight tag in Pallav0099/kai
        required: true
        type: string
      prerelease:
        description: Publish as a factory pre-release; promote it to stable only after pilot acceptance
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: xrig-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, sign, and publish tagged Windows release
    runs-on: windows-latest
    timeout-minutes: 180
    environment: production
    env:
      XRIG_SOURCE_READ_TOKEN: ${{ secrets.XRIG_SOURCE_READ_TOKEN }}
      XRIG_RELEASE_SIGNING_PKCS8_B64: ${{ secrets.XRIG_RELEASE_SIGNING_PKCS8_B64 }}
      SUPABASE_ANON_KEY: ${{ vars.XRIG_SUPABASE_ANON_KEY }}
      ACTIVATION_RESPONSE_PUBLIC_KEY_HEX: ${{ vars.XRIG_ACTIVATION_RESPONSE_PUBLIC_KEY_HEX }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out release orchestration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate inputs and protected configuration
        id: versions
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($name in @('XRIG_SOURCE_READ_TOKEN', 'XRIG_RELEASE_SIGNING_PKCS8_B64', 'SUPABASE_ANON_KEY', 'ACTIVATION_RESPONSE_PUBLIC_KEY_HEX')) {
            if (-not [Environment]::GetEnvironmentVariable($name)) { throw "$name is not configured in the production environment." }
          }
          function Convert-TagToVersion([string]$value, [string]$name) {
            if ($value -notmatch '^v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$') {
              throw "$name must be a v-prefixed SemVer tag."
            }
            return $Matches[1]
          }
          $release = Convert-TagToVersion '${{ inputs.release_tag }}' 'release_tag'
          $platform = Convert-TagToVersion '${{ inputs.platform_tag }}' 'platform_tag'
          $vertex = Convert-TagToVersion '${{ inputs.vertex_tag }}' 'vertex_tag'
          $kai = Convert-TagToVersion '${{ inputs.kai_tag }}' 'kai_tag'
          "release=$release" >> $env:GITHUB_OUTPUT
          "platform=$platform" >> $env:GITHUB_OUTPUT
          "vertex=$vertex" >> $env:GITHUB_OUTPUT
          "kai=$kai" >> $env:GITHUB_OUTPUT

      - name: Check out tagged XRIG Platform source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Pallav0099/xrig-platform
          ref: ${{ inputs.platform_tag }}
          token: ${{ secrets.XRIG_SOURCE_READ_TOKEN }}
          persist-credentials: false
          path: src/platform

      - name: Check out tagged Vertex source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Pallav0099/xrig-llama-backend
          ref: ${{ inputs.vertex_tag }}
          token: ${{ secrets.XRIG_SOURCE_READ_TOKEN }}
          persist-credentials: false
          path: src/vertex

      - name: Check out tagged Kai source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Pallav0099/kai
          ref: ${{ inputs.kai_tag }}
          token: ${{ secrets.XRIG_SOURCE_READ_TOKEN }}
          persist-credentials: false
          path: src/kai

      - name: Confirm every source checkout is exactly its requested tag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Assert-ExactTag([string]$path, [string]$expected, [string]$label) {
            $actual = (git -C $path describe --tags --exact-match).Trim()
            if ($actual -ne $expected) { throw "$label is checked out at $actual, not requested tag $expected." }
            $sha = (git -C $path rev-parse HEAD).Trim()
            "$($label.ToUpperInvariant())_SHA=$sha" >> $env:GITHUB_ENV
          }
          Assert-ExactTag 'src/platform' '${{ inputs.platform_tag }}' 'platform'
          Assert-ExactTag 'src/vertex' '${{ inputs.vertex_tag }}' 'vertex'
          Assert-ExactTag 'src/kai' '${{ inputs.kai_tag }}' 'kai'

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/platform/go.mod

      - name: Set up Node.js 22.23.1
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - name: Set up Python 3.11.9
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11.9
          architecture: x64

      - name: Set up locked uv for Kai runtime preparation
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: 0.8.22
          enable-cache: false

      - name: Build and test XRIG Platform release tooling
        shell: pwsh
        env:
          PLATFORM_VERSION: ${{ steps.versions.outputs.platform }}
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location src/platform
          try {
            go test ./...
            ./scripts/xrig-identity.contract.Tests.ps1
            ./scripts/build-xrig-identity.contract.Tests.ps1
            ./scripts/Install-XRIG-Platform.contract.Tests.ps1
            New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\tools" | Out-Null
            ./scripts/build-xrig-identity.ps1 -Version $env:PLATFORM_VERSION -SupabaseAnonKey $env:SUPABASE_ANON_KEY -ActivationResponsePublicKeyHex $env:ACTIVATION_RESPONSE_PUBLIC_KEY_HEX -OutputPath "$env:GITHUB_WORKSPACE\tools\xrig-identity.exe"
            go build -trimpath -o "$env:GITHUB_WORKSPACE\tools\xrig-keytool.exe" ./cmd/xrig-keytool
          }
          finally { Pop-Location }

      - name: Build tagged Vertex artifacts
        shell: pwsh
        env:
          VERTEX_VERSION: ${{ steps.versions.outputs.vertex }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path artifacts, artifacts\stage\xrig\bin, artifacts\stage\xrig\LICENSES | Out-Null
          Push-Location src/vertex
          try {
            go test ./...
            npm ci --prefix cmd/xrig-app/frontend
            npm run build --prefix cmd/xrig-app/frontend
            $wailsVersion = (Get-Content .wails-version -Raw).Trim()
            go install "github.com/wailsapp/wails/v2/cmd/wails@$wailsVersion"
            $wailsBin = "$(go env GOPATH)\bin"
            $env:PATH = "$wailsBin;$env:PATH"
            Push-Location cmd/xrig-app
            try { wails build -tags xrigapp -platform windows/amd64 -o xrig-app.exe }
            finally { Pop-Location }
            Copy-Item cmd/xrig-app/build/bin/xrig-app.exe "$env:GITHUB_WORKSPACE\artifacts\Vertex-$env:VERTEX_VERSION-win-x64.exe" -Force
            go build -trimpath -ldflags '-s -w' -o "$env:GITHUB_WORKSPACE\artifacts\Vertex-install-$env:VERTEX_VERSION-win-x64.exe" ./cmd/xrig-install
            go build -trimpath -ldflags '-s -w' -o "$env:GITHUB_WORKSPACE\artifacts\stage\xrig\bin\xrig-serve.exe" ./cmd/xrig-serve
            Set-Content -LiteralPath "$env:GITHUB_WORKSPACE\artifacts\stage\xrig\VERSION" -Value $env:VERTEX_VERSION -Encoding ascii -NoNewline
            Copy-Item THIRD_PARTY_NOTICES.md "$env:GITHUB_WORKSPACE\artifacts\stage\xrig\NOTICE" -Force
            Copy-Item licenses\Apache-2.0.txt "$env:GITHUB_WORKSPACE\artifacts\stage\xrig\LICENSES\Apache-2.0.txt" -Force
            tar -czf "$env:GITHUB_WORKSPACE\artifacts\Vertex-runtime-$env:VERTEX_VERSION-win-x64.tar.gz" -C "$env:GITHUB_WORKSPACE\artifacts\stage" xrig
            Copy-Item configs\gemma4-12b-5060ti.json "$env:GITHUB_WORKSPACE\artifacts\gemma4-12b-5060ti.json" -Force
            Copy-Item scripts\install.ps1 "$env:GITHUB_WORKSPACE\artifacts\Install-Vertex-inner-$env:VERTEX_VERSION.ps1" -Force
            Copy-Item scripts\bootstrap.ps1 "$env:GITHUB_WORKSPACE\artifacts\Install-Vertex.ps1" -Force
          }
          finally { Pop-Location }

      - name: Mirror the locked Vertex runtime archives
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = 'b9878'
          $names = @('llama-b9878-bin-win-cuda-12.4-x64.zip', 'cudart-llama-bin-win-cuda-12.4-x64.zip')
          foreach ($name in $names) {
            Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/ggml-org/llama.cpp/releases/download/$tag/$name" -OutFile (Join-Path $env:GITHUB_WORKSPACE "artifacts\$name")
          }

      - name: Build tagged Kai artifact
        shell: pwsh
        env:
          KAI_VERSION: ${{ steps.versions.outputs.kai }}
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location src/kai
          try {
            npm ci
            npm run build --workspace web
            npm run build --workspace ui-tui
            ./scripts/Prepare-Kai-WindowsRuntime.ps1 `
              -BuildPython (Get-Command python).Source `
              -UvCommand (Get-Command uv).Source `
              -BuildNode (Get-Command node).Source `
              -NpmCommand (Get-Command npm.cmd).Source
            ./scripts/check-kai-brand.ps1 -RuntimeRoot apps/desktop/build/kai-runtime
            npm run assert:runtime:win --workspace apps/desktop
            npm run dist:win:nsis --workspace apps/desktop
            $package = @(Get-ChildItem apps/desktop/release/kai-*-win-x64.exe -File)
            if ($package.Count -ne 1) { throw 'Expected exactly one Kai NSIS package.' }
            Copy-Item $package[0].FullName "$env:GITHUB_WORKSPACE\artifacts\Kai-$env:KAI_VERSION-win-x64.exe" -Force
            Copy-Item scripts\Install-Kai.ps1 "$env:GITHUB_WORKSPACE\artifacts\Install-Kai-inner-$env:KAI_VERSION.ps1" -Force
            Copy-Item scripts\bootstrap-kai.ps1 "$env:GITHUB_WORKSPACE\artifacts\Install-Kai.ps1" -Force
          }
          finally { Pop-Location }

      - name: Refuse to publish a Supabase release bootstrap
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('artifacts\Install-Vertex.ps1', 'artifacts\Install-Kai.ps1')) {
            $content = Get-Content -LiteralPath $file -Raw
            if ($content -match 'supabase\.co/storage' -or $content -notmatch 'github\.com/Pallav0099/xrig-releases') {
              throw "$file has not been migrated to the GitHub Releases bootstrap contract."
            }
          }

      - name: Record source lock
        shell: pwsh
        run: |
          $lock = [ordered]@{
            format = 'xrig-source-lock-v1'
            release_tag = '${{ inputs.release_tag }}'
            platform = [ordered]@{ tag = '${{ inputs.platform_tag }}'; sha = $env:PLATFORM_SHA }
            vertex = [ordered]@{ tag = '${{ inputs.vertex_tag }}'; sha = $env:VERTEX_SHA }
            kai = [ordered]@{ tag = '${{ inputs.kai_tag }}'; sha = $env:KAI_SHA }
          }
          $lock | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath artifacts\source-lock.json -Encoding utf8

      - name: Sign immutable release payloads
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $key = Join-Path $env:RUNNER_TEMP 'xrig-release-signing.key'
          try {
            [IO.File]::WriteAllBytes($key, [Convert]::FromBase64String($env:XRIG_RELEASE_SIGNING_PKCS8_B64))
            $unsigned = Get-ChildItem artifacts -File | Where-Object { $_.Name -ne 'gemma4-12b-5060ti.json' }
            foreach ($artifact in $unsigned) {
              & tools\xrig-keytool.exe sign --private-key $key --file $artifact.FullName --signature "$($artifact.FullName).sig"
              if ($LASTEXITCODE -ne 0) { throw "Signing failed: $($artifact.Name)" }
            }
            $unsigned | Get-FileHash -Algorithm SHA256 | ForEach-Object {
              "$($_.Hash.ToLowerInvariant())  $($_.Path.Replace((Resolve-Path artifacts).Path + '\\', ''))"
            } | Set-Content -LiteralPath artifacts\SHA256SUMS.txt -Encoding ascii
            & tools\xrig-keytool.exe sign --private-key $key --file artifacts\SHA256SUMS.txt --signature artifacts\SHA256SUMS.txt.sig
            if ($LASTEXITCODE -ne 0) { throw 'Signing failed: SHA256SUMS.txt' }
          }
          finally {
            Remove-Item -LiteralPath $key -Force -ErrorAction SilentlyContinue
          }

      - name: Generate and verify canonical release manifest
        shell: pwsh
        env:
          PLATFORM_VERSION: ${{ steps.versions.outputs.platform }}
          VERTEX_VERSION: ${{ steps.versions.outputs.vertex }}
          KAI_VERSION: ${{ steps.versions.outputs.kai }}
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/New-XrigReleaseManifest.ps1 `
            -ReleaseTag '${{ inputs.release_tag }}' `
            -PlatformVersion $env:PLATFORM_VERSION `
            -VertexVersion $env:VERTEX_VERSION `
            -KaiVersion $env:KAI_VERSION `
            -AssetDirectory artifacts `
            -OutputPath artifacts\xrig-release-v1.manifest
          $key = Join-Path $env:RUNNER_TEMP 'xrig-release-signing.key'
          try {
            [IO.File]::WriteAllBytes($key, [Convert]::FromBase64String($env:XRIG_RELEASE_SIGNING_PKCS8_B64))
            & tools\xrig-keytool.exe sign --private-key $key --file artifacts\xrig-release-v1.manifest --signature artifacts\xrig-release-v1.manifest.sig
            if ($LASTEXITCODE -ne 0) { throw 'Signing failed: xrig-release-v1.manifest' }
          }
          finally {
            Remove-Item -LiteralPath $key -Force -ErrorAction SilentlyContinue
          }
          & tools\xrig-identity.exe --mode verify-release --manifest artifacts\xrig-release-v1.manifest --signature artifacts\xrig-release-v1.manifest.sig --json
          if ($LASTEXITCODE -ne 0) { throw 'XRIG Platform rejected the generated release manifest.' }
          if ((Get-ChildItem artifacts -File | Where-Object { $_.Length -ge 2GB }).Count -ne 0) {
            throw 'A GitHub Release asset reached the 2 GiB per-file limit.'
          }

      - name: Publish immutable GitHub Release assets
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.release }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (& gh release view '${{ inputs.release_tag }}' --repo Pallav0099/xrig-releases 2>$null) {
            throw "GitHub Release ${{ inputs.release_tag }} already exists. Immutable release assets must not be replaced."
          }
          $manifestHash = (Get-FileHash -LiteralPath artifacts\xrig-release-v1.manifest -Algorithm SHA256).Hash.ToLowerInvariant()
          @"
          # XRIG AI PC $env:RELEASE_VERSION

          Source locks:
          - Platform: ${{ inputs.platform_tag }} ($env:PLATFORM_SHA)
          - Vertex: ${{ inputs.vertex_tag }} ($env:VERTEX_SHA)
          - Kai: ${{ inputs.kai_tag }} ($env:KAI_SHA)

          Manifest SHA-256: `$manifestHash`

          Every executable and installer must pass local XRIG Platform identity
          verification plus detached Ed25519 and SHA-256 validation before use.
          "@ | Set-Content -LiteralPath artifacts\RELEASE_NOTES.md -Encoding utf8
          $args = @('release', 'create', '${{ inputs.release_tag }}', '--repo', 'Pallav0099/xrig-releases', '--title', "XRIG AI PC $env:RELEASE_VERSION", '--notes-file', 'artifacts\RELEASE_NOTES.md')
          if ('${{ inputs.prerelease }}' -eq 'true') { $args += '--prerelease' }
          $args += @(Get-ChildItem artifacts -File | Where-Object { $_.Name -ne 'RELEASE_NOTES.md' } | ForEach-Object FullName)
          & gh @args
          if ($LASTEXITCODE -ne 0) { throw 'GitHub Release publication failed.' }
